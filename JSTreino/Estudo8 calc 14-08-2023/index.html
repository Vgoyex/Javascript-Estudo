<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/styles.css">
    <title>Estudo 8 14-08-2023</title>
</head>
<body>
    
    <section class="container">
        <header>
            <h1 class="titulo">Calc</h1>
        </header>

        <div class="d1">
            <table>
                <tr>
                    <td colspan="4"><input type="text" class="display"></td>
                </tr>

                <tr>
                    <td><button class="num clear">C</button></td>
                    <td><button class="num">(</button></td>
                    <td><button class="num">)</button></td>
                    <td><button class="num eq">/</button></td>
                </tr>

                <tr>
                    <td><button class="num">7</button></td>
                    <td><button class="num">8</button></td>
                    <td><button class="num">9</button></td>
                    <td><button class="num eq">*</button></td>
                </tr>
                    <td><button class="num">4</button></td>
                    <td><button class="num">5</button></td>
                    <td><button class="num">6</button></td>
                    <td><button class="num eq">+</button></td>
                <tr>

                </tr>
                    <td><button class="num">1</button></td>
                    <td><button class="num">2</button></td>
                    <td><button class="num">3</button></td>
                    <td><button class="num eq">-</button></td>
                <tr>
                    <td><button class="num">.</button></td>
                    <td><button class="num">0</button></td>
                    <td><button class="num del"><<</button></td>
                    <td><button class="num submit-calc">=</button>
                </tr>

            </table>
        </div>

        <br>

        <div>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-7kzqFA7TchAWL4CkcXaCo-skg86g4jQ59Q&usqp=CAU" width="600" >
        </div>

    </section>

    <script src="js/script.js"></script>
</body>
</html>
